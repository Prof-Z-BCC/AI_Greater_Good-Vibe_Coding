<!DOCTYPE html>
<!--
  DEMO 04 — VERSION 1: CLEAN START
  ══════════════════════════════════════════════════════
  Session: Day 1 of the project.
  Prompt used: "Create a community task manager for a small nonprofit.
  Volunteers can add tasks with a title, assignee name, and status (pending/complete).
  Tasks display in a list. Data persists with localStorage. Accessible and mobile-friendly."

  STATE: ✅ Clean
  - Consistent naming: everything is a "task"
  - Single data model: { id, title, assignee, status, createdAt }
  - One render function: renderTasks()
  - One save function: saveTasks()
  - Clean file (under 100 lines of JS)
  - All form fields have labels
  ══════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 2rem 1rem; }
    .app { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2rem; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #028090; margin-bottom: 1.5rem; }
    .version-badge { display: inline-block; background: #028090; color: #fff; font-size: 0.75rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 1rem; }
    form { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
    label { font-size: 0.875rem; font-weight: 600; color: #2b3a3c; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 2px solid #d0d8da; border-radius: 6px; font-size: 1rem; }
    input:focus, select:focus { outline: none; border-color: #028090; }
    button[type="submit"] { padding: 0.6rem 1.2rem; background: #028090; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button[type="submit"]:hover { background: #026070; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #eef0f0; }
    li:last-child { border-bottom: none; }
    .task-title { flex: 1; font-weight: 600; color: #2b3a3c; }
    .task-assignee { font-size: 0.875rem; color: #5a6b6e; }
    .task-status { font-size: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-complete { background: #d1fae5; color: #065f46; }
    .btn-delete { background: none; border: none; color: #b85042; cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem; }
    .empty { text-align: center; color: #9aacae; padding: 1.5rem; }
  </style>
</head>
<body>
<main class="app">
  <span class="version-badge">v1 — Clean Start</span>
  <h1>Community Task Manager</h1>

  <form id="task-form">
    <div>
      <label for="task-title">Task title</label>
      <input type="text" id="task-title" required autocomplete="off" placeholder="What needs to be done?">
    </div>
    <div>
      <label for="task-assignee">Assign to</label>
      <input type="text" id="task-assignee" required autocomplete="off" placeholder="Volunteer name">
    </div>
    <div>
      <label for="task-status">Status</label>
      <select id="task-status">
        <option value="pending">Pending</option>
        <option value="complete">Complete</option>
      </select>
    </div>
    <button type="submit">Add Task</button>
  </form>

  <ul id="task-list" aria-label="Task list" aria-live="polite"></ul>
</main>

<script>
  // ── Data model ────────────────────────────────────────
  // Task: { id: number, title: string, assignee: string, status: 'pending'|'complete', createdAt: string }

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

  // ── Persistence ───────────────────────────────────────
  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  // ── Render ────────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    if (tasks.length === 0) {
      list.innerHTML = '<li class="empty">No tasks yet. Add one above.</li>';
      return;
    }
    tasks.forEach(task => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="task-title">${escapeHtml(task.title)}</span>
        <span class="task-assignee">${escapeHtml(task.assignee)}</span>
        <span class="task-status status-${task.status}">${task.status}</span>
        <button class="btn-delete" aria-label="Delete task: ${escapeHtml(task.title)}">✕</button>
      `;
      li.querySelector('.btn-delete').addEventListener('click', () => deleteTask(task.id));
      list.appendChild(li);
    });
  }

  // ── Actions ───────────────────────────────────────────
  function addTask(title, assignee, status) {
    tasks.push({ id: Date.now(), title, assignee, status, createdAt: new Date().toISOString() });
    saveTasks();
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  // ── Safety ────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Events ────────────────────────────────────────────
  document.getElementById('task-form').addEventListener('submit', e => {
    e.preventDefault();
    addTask(
      document.getElementById('task-title').value.trim(),
      document.getElementById('task-assignee').value.trim(),
      document.getElementById('task-status').value
    );
    e.target.reset();
  });

  renderTasks();
</script>
</body>
</html>
