<!DOCTYPE html>
<!--
  DEMO 04 — VERSION 4: DUPLICATE LOGIC
  ══════════════════════════════════════════════════════
  Session: AI session 4.
  Prompt used: "The list isn't updating when I add a task. Fix it."

  AI didn't understand that renderItems() was the correct function.
  It added a NEW renderTasks() function AND calls renderItems() too.
  Both run. renderTasks() runs second and overwrites renderItems() output.

  ⚠️ DRIFT: Two render functions — one overrides the other
  - renderItems()  ← from v3, works correctly
  - renderTasks()  ← new function added by AI to "fix" the bug
  - Both are called. renderTasks() runs last. It always wins.
  - But renderTasks() uses old CSS classes that don't exist in v3 styles.
  - Result: tasks appear but priority badges are unstyled.

  FACILITATOR: Add a task. It appears — but the priority badge has no color.
  The bug was "fixed" by adding more code, not by fixing the original code.
  ══════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 2rem 1rem; }
    .app { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2rem; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #028090; margin-bottom: 0.5rem; }
    .version-badge { display: inline-block; background: #B85042; color: #fff; font-size: 0.75rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 1rem; }
    .drift-notice { background: #fee2e2; border-left: 4px solid #dc2626; padding: 0.75rem 1rem; font-size: 0.85rem; color: #991b1b; margin-bottom: 1rem; border-radius: 0 6px 6px 0; }
    form { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
    label { font-size: 0.875rem; font-weight: 600; color: #2b3a3c; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 2px solid #d0d8da; border-radius: 6px; font-size: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    button[type="submit"] { padding: 0.6rem 1.2rem; background: #028090; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #eef0f0; flex-wrap: wrap; }
    .task-title { flex: 1; font-weight: 600; color: #2b3a3c; min-width: 120px; }
    .item-assignee { font-size: 0.875rem; color: #5a6b6e; }
    .badge { font-size: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-complete { background: #d1fae5; color: #065f46; }
    .priority-low { background: #e0f2fe; color: #0369a1; }
    .priority-medium { background: #fef3c7; color: #92400e; }
    .priority-high { background: #fee2e2; color: #991b1b; }
    .urgent-flag { background: #dc2626; color: #fff; }
    .todo-delete-btn { background: none; border: none; color: #b85042; cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem; }
    /* PROBLEM: renderTasks() (new function) uses 'task-priority-badge' class — not defined here */
    /* So badges rendered by renderTasks() appear as plain unstyled text */
    .empty { text-align: center; color: #9aacae; padding: 1.5rem; }
  </style>
</head>
<body>
<main class="app">
  <span class="version-badge">v4 — Duplicate Logic ❌</span>
  <h1>Community Task Manager</h1>
  <div class="drift-notice">
    <strong>Facilitator note:</strong> Add a task. It appears — but priority badges have no color styling. Two render functions exist and conflict. Open DevTools → Console to see the duplication.
  </div>

  <form id="todo-form">
    <div>
      <label for="item-title">Task title</label>
      <input type="text" id="item-title" required autocomplete="off" placeholder="What needs to be done?">
    </div>
    <div>
      <label for="item-assignee">Assign to</label>
      <input type="text" id="item-assignee" required autocomplete="off" placeholder="Volunteer name">
    </div>
    <div class="form-row">
      <div>
        <label for="todo-status">Status</label>
        <select id="todo-status">
          <option value="pending">Pending</option>
          <option value="complete">Complete</option>
        </select>
      </div>
      <div>
        <label for="item-priority">Priority</label>
        <select id="item-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
    </div>
    <button type="submit">Add Task</button>
  </form>

  <ul id="task-list" aria-live="polite"></ul>
</main>

<script>
  let todoItems = JSON.parse(localStorage.getItem('tasks') || '[]');

  function saveItems() {
    localStorage.setItem('tasks', JSON.stringify(todoItems));
  }

  // ORIGINAL render function from v3
  function renderItems() {
    console.log('[renderItems] called — rendering', todoItems.length, 'items'); // debug log left in
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    if (todoItems.length === 0) {
      list.innerHTML = '<li class="empty">No tasks yet.</li>';
      return;
    }
    todoItems.forEach(item => {
      const priority = item.priority || 'low';
      const priorityClass = priority === 'urgent' ? 'urgent-flag' : `priority-${priority}`;
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="task-title">${escapeHtml(item.title)}</span>
        <span class="item-assignee">${escapeHtml(item.assignee)}</span>
        <span class="badge ${priorityClass}">${priority}</span>
        <span class="badge status-${item.status}">${item.status}</span>
        <button class="todo-delete-btn" aria-label="Remove">✕</button>
      `;
      li.querySelector('.todo-delete-btn').addEventListener('click', () => removeItem(item.id));
      list.appendChild(li);
    });
  }

  // !! DUPLICATE FUNCTION added by AI to "fix" a bug !!
  // This runs AFTER renderItems() and overwrites its output.
  // It uses 'task-priority-badge' class which doesn't exist in the CSS.
  function renderTasks() {
    console.log('[renderTasks] called — OVERWRITING renderItems output'); // debug log
    const list = document.getElementById('task-list');
    list.innerHTML = ''; // wipes what renderItems() just rendered
    if (todoItems.length === 0) {
      list.innerHTML = '<li class="empty">No tasks to show.</li>';
      return;
    }
    todoItems.forEach(task => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="task-title">${escapeHtml(task.title)}</span>
        <span class="item-assignee">${escapeHtml(task.assignee)}</span>
        <span class="task-priority-badge">${task.priority || 'low'}</span>
        <span class="badge status-${task.status}">${task.status}</span>
        <button class="todo-delete-btn" onclick="removeItem(${task.id})">✕</button>
      `; // ADDITIONAL DRIFT: uses onclick= inline instead of addEventListener
      list.appendChild(li);
    });
  }

  function addTodoItem(title, assignee, status, priority) {
    todoItems.push({ id: Date.now(), title, assignee, status, priority, createdAt: new Date().toISOString() });
    saveItems();
    renderItems(); // calls first render
    renderTasks(); // THEN calls second render — overwrites the first
  }

  function removeItem(id) {
    todoItems = todoItems.filter(item => item.id !== id);
    saveItems();
    renderItems();
    renderTasks(); // called again here too
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('todo-form').addEventListener('submit', e => {
    e.preventDefault();
    addTodoItem(
      document.getElementById('item-title').value.trim(),
      document.getElementById('item-assignee').value.trim(),
      document.getElementById('todo-status').value,
      document.getElementById('item-priority').value
    );
    e.target.reset();
  });

  renderItems();
  renderTasks(); // both called on load too
</script>
</body>
</html>
