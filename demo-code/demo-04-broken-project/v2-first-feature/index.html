<!DOCTYPE html>
<!--
  DEMO 04 — VERSION 2: FIRST FEATURE ADDED
  ══════════════════════════════════════════════════════
  Session: AI session 2. Context still fresh.
  Prompt used: "Add a priority field to tasks: Low, Medium, or High.
  Show a color-coded badge next to each task. Keep everything else the same."

  STATE: ✅ Still clean
  - Naming still consistent: everything is a "task"
  - Data model extended correctly: added 'priority' field
  - renderTasks() updated — not replaced
  - No duplicate code introduced
  ══════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 2rem 1rem; }
    .app { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2rem; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #028090; margin-bottom: 1.5rem; }
    .version-badge { display: inline-block; background: #028090; color: #fff; font-size: 0.75rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 1rem; }
    form { display: grid; gap: 0.75rem; margin-bottom: 1.5rem; }
    label { font-size: 0.875rem; font-weight: 600; color: #2b3a3c; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 2px solid #d0d8da; border-radius: 6px; font-size: 1rem; }
    input:focus, select:focus { outline: none; border-color: #028090; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    button[type="submit"] { padding: 0.6rem 1.2rem; background: #028090; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #eef0f0; flex-wrap: wrap; }
    .task-title { flex: 1; font-weight: 600; color: #2b3a3c; min-width: 120px; }
    .task-assignee { font-size: 0.875rem; color: #5a6b6e; }
    .badge { font-size: 0.8rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 600; white-space: nowrap; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-complete { background: #d1fae5; color: #065f46; }
    .priority-low { background: #e0f2fe; color: #0369a1; }
    .priority-medium { background: #fef3c7; color: #92400e; }
    .priority-high { background: #fee2e2; color: #991b1b; }
    .btn-delete { background: none; border: none; color: #b85042; cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem; }
    .empty { text-align: center; color: #9aacae; padding: 1.5rem; }
  </style>
</head>
<body>
<main class="app">
  <span class="version-badge">v2 — Priority Added (Clean)</span>
  <h1>Community Task Manager</h1>

  <form id="task-form">
    <div>
      <label for="task-title">Task title</label>
      <input type="text" id="task-title" required autocomplete="off" placeholder="What needs to be done?">
    </div>
    <div>
      <label for="task-assignee">Assign to</label>
      <input type="text" id="task-assignee" required autocomplete="off" placeholder="Volunteer name">
    </div>
    <div class="form-row">
      <div>
        <label for="task-status">Status</label>
        <select id="task-status">
          <option value="pending">Pending</option>
          <option value="complete">Complete</option>
        </select>
      </div>
      <div>
        <label for="task-priority">Priority</label>
        <select id="task-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>
    <button type="submit">Add Task</button>
  </form>

  <ul id="task-list" aria-label="Task list" aria-live="polite"></ul>
</main>

<script>
  // ── Data model ─────────────────────────────────────────────────────────
  // Task: { id, title, assignee, status: 'pending'|'complete', priority: 'low'|'medium'|'high', createdAt }
  // NOTE: priority field added in v2. Existing tasks without priority default to 'low' in render.

  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    if (tasks.length === 0) {
      list.innerHTML = '<li class="empty">No tasks yet.</li>';
      return;
    }
    tasks.forEach(task => {
      const priority = task.priority || 'low'; // backward compat
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="task-title">${escapeHtml(task.title)}</span>
        <span class="task-assignee">${escapeHtml(task.assignee)}</span>
        <span class="badge priority-${priority}">${priority}</span>
        <span class="badge status-${task.status}">${task.status}</span>
        <button class="btn-delete" aria-label="Delete task: ${escapeHtml(task.title)}">✕</button>
      `;
      li.querySelector('.btn-delete').addEventListener('click', () => deleteTask(task.id));
      list.appendChild(li);
    });
  }

  function addTask(title, assignee, status, priority) {
    tasks.push({ id: Date.now(), title, assignee, status, priority, createdAt: new Date().toISOString() });
    saveTasks();
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    renderTasks();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-form').addEventListener('submit', e => {
    e.preventDefault();
    addTask(
      document.getElementById('task-title').value.trim(),
      document.getElementById('task-assignee').value.trim(),
      document.getElementById('task-status').value,
      document.getElementById('task-priority').value
    );
    e.target.reset();
  });

  renderTasks();
</script>
</body>
</html>
