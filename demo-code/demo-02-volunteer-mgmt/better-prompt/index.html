<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volunteer Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .form-section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background: #2c7a4b;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #225f3a; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    th {
      background: #2c7a4b;
      color: white;
      padding: 12px;
      text-align: left;
    }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .empty { color: #999; font-style: italic; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <h1>Volunteer Management</h1>

  <section class="form-section">
    <h2>Add a Volunteer</h2>
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Jane Smith">

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="jane@example.com">

    <button onclick="addVolunteer()">Add Volunteer</button>
  </section>

  <h2>Volunteers</h2>
  <div id="tableContainer">
    <p class="empty">No volunteers yet. Add one above.</p>
  </div>

  <script>
    var volunteers = [];

    function addVolunteer() {
      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();

      if (!name || !email) {
        alert('Please enter both a name and an email.');
        return;
      }

      volunteers.push({ name: name, email: email });
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      renderTable();
    }

    function renderTable() {
      var container = document.getElementById('tableContainer');
      if (volunteers.length === 0) {
        container.innerHTML = '<p class="empty">No volunteers yet. Add one above.</p>';
        return;
      }

      var html = '<table><thead><tr><th>Name</th><th>Email</th></tr></thead><tbody>';
      for (var i = 0; i < volunteers.length; i++) {
        html += '<tr><td>' + escapeHtml(volunteers[i].name) + '</td><td>' + escapeHtml(volunteers[i].email) + '</td></tr>';
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }
  </script>
</body>
</html>
